[general]
lore_binary = "lore"
refresh_interval_ms = 2000
# Maximum milliseconds to wait for a lore sub-process. Commands that exceed
# this limit are killed and the server is marked offline (min: 500).
command_timeout_ms = 3000
# How long (ms) to wait between background reconnection probes while offline.
# Probes only fire in auto-offline mode; forced offline (--offline / O) disables
# them entirely (min: 5000).
reconnect_interval_ms = 30000
# Start in forced-offline mode. Suppresses all server-touching commands and
# background reconnection probes. Toggle at runtime with O.
offline = false
watch_files = true
scan_on_start = false
history_page_size = 100
confirm_destructive = true

[ui]
mouse = true
file_tree = true
theme = "default"

[tools]
# editor = "code"
# opener = ""
# diff_tool = ""

# Content-addressed results (revision deltas, revision-to-revision diffs) are
# memoized in memory and under the platform cache directory, since they're
# keyed on immutable revision hashes and can never change. Working-tree
# state, status, history, branches, and locks are never cached.
[cache]
enabled = true
ttl_secs = 604800
max_disk_mb = 128
max_memory_entries = 256

# Action names can be rebound without changing the remaining defaults.
[keybindings]
# quit = "ctrl+q"
# command_palette = "ctrl+p"
# pane_next = "tab"
# pane_previous = "shift+tab"
# diff_mode = "ctrl+tab"
# file_stage = "space"
# file_commit = "c"
# branch_switch = "space"
# revision_revert = "t"

